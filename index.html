<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- Apple Standalone App Capabilites -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BitCam">
  <link rel="apple-touch-icon" href="icon-192.png">
 
  <!-- PWA Manifest Link -->
  <link rel="manifest" href="manifest.json">
 
  <title>BitCam | Retro Voxel Block Pixel Camera</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Instantly convert your photos into voxel block art. Auto-maps colors into textured block patterns and 8-bit or 16-bit retro grids.">
  <meta name="keywords" content="pixel art, voxelizer, block cam, PWA, image converter, frontend app, voxel art">
  <meta name="author" content="Antigravity">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css?v=2">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23ff3b30' stroke='%23ffffff' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23111116'/%3E%3C/svg%3E">
</head>
<body>
 
  <!-- Main Camera Handheld Housing -->
  <main class="camera-body">
    
    <!-- Camera Top Panel (Grip, Brand, Power LED, Sub LCD) -->
    <header class="camera-top-bar">
      <div class="brand-panel">
        <span class="brand-name">BIT</span>
        <span class="brand-model">CAM</span>
      </div>
      
      <!-- Physical casing LCD window showing battery and date -->
      <div class="camera-sub-lcd">
        <span class="sub-lcd-item date-casing" id="casing-date">11.07.01</span>
        <span class="sub-lcd-item battery-casing">▰▰▰</span>
      </div>
 
      <div class="status-led-group">
        <div class="status-led-item">
          <div class="led led-power glowing"></div>
          <span class="led-label">POWER</span>
        </div>
        <div class="status-led-item">
          <div id="led-ready" class="led led-ready"></div>
          <span class="led-label">READY</span>
        </div>
      </div>
    </header>
 
    <!-- Camera Viewfinder LCD Screen -->
    <section class="camera-screen-bevel">
      <div class="camera-screen-glare"></div>
      
      <!-- LCD Screen Display Area -->
      <div id="screen-display" class="camera-screen-display">
        
        <!-- Retro Camera LCD HUD Overlays -->
        <div class="lcd-hud lcd-hud-top">
          <span class="hud-item mode-label">● ACTIVE</span>
        </div>
 
        <div class="lcd-hud-center">
          <div class="crosshair-bracket left-top"></div>
          <div class="crosshair-bracket right-top"></div>
          <div class="crosshair-center">+</div>
          <div class="crosshair-bracket left-bottom"></div>
          <div class="crosshair-bracket right-bottom"></div>
        </div>
 
        <div class="lcd-hud lcd-hud-bottom">
          <span class="hud-item quality-label">HQ 16b</span>
        </div>
 
        <!-- PWA Casing Overlay Prompt (System Install Alert) -->
        <div id="pwa-prompt" class="pwa-prompt" style="display: none;">
          <div class="pwa-prompt-content">
            <span class="pwa-prompt-icon">⚙️</span>
            <h4 class="pwa-prompt-title">SYSTEM UPDATE</h4>
            <p id="pwa-prompt-text">Install this web app to run full-screen without address bars!</p>
            <div class="pwa-prompt-actions">
              <button id="pwa-install-btn" class="btn-shutter-alt hidden">INSTALL</button>
              <button id="pwa-close-btn" class="btn-metal-alt">DISMISS</button>
            </div>
          </div>
        </div>
 
        <!-- Desktop Casing Overlay Prompt (Hardware Warning & QR) -->
        <div id="desktop-prompt" class="pwa-prompt" style="display: none;">
          <div class="pwa-prompt-content">
            <span class="pwa-prompt-icon">⚠️</span>
            <h4 class="pwa-prompt-title">HARDWARE WARNING</h4>
            <p id="desktop-prompt-text">BitCam is a mobile handheld camera. Scan to switch to your phone!</p>
            <div style="background: #fff; padding: 4px; border-radius: 6px; display: inline-block; box-shadow: var(--lcd-hud-glow); border: 2px solid var(--lcd-hud-color); margin-bottom: 4px;">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=https://SooYM.github.io/VicePoly/" alt="QR Code" style="width: 110px; height: 110px; display: block; image-rendering: pixelated;">
            </div>
            <div class="pwa-prompt-actions">
              <button id="desktop-close-btn" class="btn-metal-alt">CONTINUE</button>
            </div>
          </div>
        </div>

        <!-- File Drop & Select Zone (Visible when no image is loaded) -->
        <div id="drop-zone" class="drop-zone">
          <div class="no-photo-message">NO PHOTO LOADED</div>
        </div>

        <!-- Live Viewport Canvas Wrapper -->
        <div id="canvas-wrapper" class="canvas-wrapper hidden">
          <!-- Processed Low Poly Canvas (hidden offscreen) -->
          <canvas id="output-canvas" style="display: none;"></canvas>
          <!-- Interactive Image Overlay for mobile long-press save/share -->
          <img id="output-image" class="output-image" alt="Rendered BitCam Output" style="display: none;">
        </div>

        <!-- Style Selector Overlay -->
        <div id="style-selector" class="style-selector" style="display: none;">
          <button class="btn-style active" data-style="flat-pixel">16 BIT</button>
          <button class="btn-style" data-style="survival">8 BIT</button>
        </div>


      </div>
    </section>

    <!-- Camera Physical Controls Panel (3-button layout) -->
    <footer class="camera-controls-panel">
      <!-- Left: Load Button -->
      <button id="upload-btn" class="btn btn-metal" title="Load Image from Files">
        <span class="btn-cap">📂 LOAD</span>
      </button>

      <!-- Center: Shutter trigger serving as Refresh -->
      <div class="control-column-center">
        <div class="shutter-bezel">
          <button id="shutter-trigger" class="btn btn-shutter" title="Refresh/Reload Camera">
            <span class="shutter-glow"></span>
          </button>
        </div>
        <span class="shutter-label">REFRESH</span>
      </div>

      <!-- Right: Save Button -->
      <button id="download-png" class="btn btn-metal" title="Save Rendered Image" disabled>
        <span class="btn-cap">💾 SAVE</span>
      </button>

      <!-- Hidden file input -->
      <input type="file" id="file-input" accept="image/*" class="hidden" style="display:none;">
    </footer>

  </main>

  <!-- Heavy Computation Spinner Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner-poly"></div>
    <div class="loading-text">RENDERING 3D MESH...</div>
  </div>

  <!-- Application JS Modules -->
  <script src="https://cdn.jsdelivr.net/npm/heic-to@1.5.2/dist/iife/heic-to.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registration successful:', reg.scope))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
